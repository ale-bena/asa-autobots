<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASA Autobots - Project Specification Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Dark Theme Colors (Default) */
            --bg-page: #0b0f19;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-sidebar: rgba(10, 14, 23, 0.9);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-inverse: #0b0f19;
            
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --secondary: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.2);
            
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-blur: blur(12px);
        }

        .light-mode {
            /* Light Theme Colors */
            --bg-page: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-sidebar: rgba(241, 245, 249, 0.95);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-inverse: #ffffff;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.1);
            --secondary: #9333ea;
            --accent-cyan: #0891b2;
            --accent-green: #059669;
            --accent-orange: #ea580c;
            --accent-red: #dc2626;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 20px rgba(79, 70, 229, 0.1);
            
            --glass-bg: rgba(0, 0, 0, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color var(--transition-normal), color var(--transition-normal);
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-page);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* --- App Layout --- */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* --- Dynamic Animated Background Glows --- */
        .bg-glows {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            right: 5%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            filter: blur(80px);
            animation: floatGlow 15s infinite alternate;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            left: 10%;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
            filter: blur(80px);
            animation: floatGlow 20s infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.1); }
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            backdrop-filter: var(--glass-blur);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-family: var(--font-heading);
            font-size: 1.25rem;
            box-shadow: var(--shadow-glow);
        }

        .brand-text {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            border-left: 2px solid transparent;
        }

        .nav-item a:hover {
            color: var(--text-main);
            background-color: var(--glass-bg);
            padding-left: 1.25rem;
        }

        .nav-item.active a {
            color: var(--primary);
            background-color: var(--primary-glow);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-shrink: 0;
        }

        .system-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--accent-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* --- Dark Mode Toggle Button --- */
        .theme-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .theme-toggle-btn:hover {
            border-color: var(--primary);
            background-color: var(--primary-glow);
        }

        /* --- Main Content Panel --- */
        .main-panel {
            flex-grow: 1;
            padding: 2.5rem 4rem;
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .badge-header {
            display: inline-flex;
            background: linear-gradient(90deg, var(--primary-glow), transparent);
            border-left: 3px solid var(--primary);
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1rem;
            border-radius: 0 4px 4px 0;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--text-main);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        h1 {
            font-size: 2.75rem;
            background: linear-gradient(135deg, var(--text-main) 30%, var(--primary) 70%, var(--secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.75rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-top: 2.5rem;
        }

        h3 {
            font-size: 1.3rem;
            margin-top: 2rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.7;
        }

        /* --- Cards & UI Elements --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            backdrop-filter: var(--glass-blur);
            transition: transform var(--transition-fast), border-color var(--transition-fast);
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- Tables --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--text-main);
            background-color: var(--glass-bg);
        }

        td {
            color: var(--text-muted);
        }

        tr:hover td {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.01);
        }

        /* Code syntax styling */
        pre {
            background-color: #05070c;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-cyan);
            background-color: rgba(6, 182, 212, 0.06);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        pre code {
            color: var(--text-main);
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }

        /* --- Comments Element Annotation Styling --- */
        .commentable {
            position: relative;
            cursor: pointer;
        }
        .commentable:hover {
            outline: 1px dashed var(--primary);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .comment-indicator-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0.2;
            transition: opacity var(--transition-fast), transform var(--transition-fast), color var(--transition-fast);
            vertical-align: middle;
            user-select: none;
            color: var(--text-muted);
        }
        .commentable:hover .comment-indicator-btn {
            opacity: 0.8;
        }
        .comment-indicator-btn:hover {
            opacity: 1;
            transform: scale(1.15);
            color: var(--primary);
        }
        .comment-indicator-btn.has-notes {
            opacity: 1;
            color: var(--secondary);
            font-weight: bold;
        }

        .inline-comments-box {
            margin-top: 0.75rem;
            margin-bottom: 0.75rem;
            background-color: rgba(99, 102, 241, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            width: 100%;
            border-left: 3px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .inline-comments-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .comment-item {
            font-size: 0.85rem;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
        }
        .comment-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
        }
        .comment-text {
            color: var(--text-main);
            word-break: break-word;
            white-space: pre-wrap;
        }
        .inline-comment-input-area {
            display: flex;
            gap: 0.5rem;
        }
        .inline-comment-input {
            flex-grow: 1;
            padding: 0.4rem 0.6rem;
            background: var(--bg-page);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 0.85rem;
        }
        .inline-comment-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        .inline-comment-submit-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity var(--transition-fast);
        }
        .inline-comment-submit-btn:hover {
            opacity: 0.9;
        }

        /* Diagram & Accordion wrappers */
        .replan-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .replan-card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .replan-num {
            background-color: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .replan-title {
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.05rem;
        }

        /* --- Custom Theme Styling for Dynamic Components --- */
        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .section-num {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: var(--shadow-sm);
        }

        /* --- Card Details --- */
        .card-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--glass-bg);
            border-color: var(--border-color);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            background-color: var(--primary-glow);
        }

        /* --- Alerts --- */
        .alert {
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .alert-info {
            background-color: rgba(6, 182, 212, 0.05);
            border-left-color: var(--accent-cyan);
            color: var(--text-main);
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.05);
            border-left-color: var(--accent-green);
            color: var(--text-main);
        }

        .alert-warning {
            background-color: rgba(249, 115, 22, 0.05);
            border-left-color: var(--accent-orange);
            color: var(--text-main);
        }

        /* --- Terminal Windows --- */
        .terminal-window {
            background-color: #05070c;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .terminal-header {
            background-color: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #f59e0b; }
        .dot-green { background-color: #10b981; }

        .terminal-title {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0 auto 0 1rem;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            font-family: var(--font-body);
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .copy-btn:hover {
            border-color: var(--primary);
            color: var(--text-main);
            background-color: var(--primary-glow);
        }

        .terminal-body {
            padding: 1.25rem;
            overflow-x: auto;
        }

        .terminal-body pre {
            background-color: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }

        /* --- Agent Deck & Cards --- */
        .agent-deck {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .agent-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: var(--glass-blur);
            transition: border-color var(--transition-fast), transform var(--transition-fast);
        }

        .agent-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .agent-badge {
            display: inline-block;
            background-color: var(--primary-glow);
            color: var(--primary);
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .agent-name {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.75rem;
        }

        .agent-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.25rem;
        }

        .agent-features {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.25rem;
            margin-top: auto;
        }

        .agent-feature-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .agent-feature-item svg {
            width: 18px;
            height: 18px;
            color: var(--accent-green);
            flex-shrink: 0;
        }

        /* --- Missions & Challenge Cards --- */
        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .mission-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.5rem;
            backdrop-filter: var(--glass-blur);
            border-top: 3px solid transparent;
            transition: all var(--transition-fast);
        }

        .mission-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .mission-card.lvl-1 { border-top-color: var(--accent-cyan); }
        .mission-card.lvl-2 { border-top-color: var(--primary); }
        .mission-card.lvl-3 { border-top-color: var(--secondary); }

        .mission-lvl {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
            display: block;
        }

        .mission-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .mission-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Responsive Layout adjustments */
        @media (max-width: 1024px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1.5rem;
            }
            .nav-menu {
                flex-direction: row;
                flex-wrap: wrap;
                margin-bottom: 1rem;
            }
            .main-panel {
                padding: 2rem;
            }
        }
    </style>
    <script src="./lib/marked.min.js"></script>
    <script src="./lib/mermaid.min.js"></script>
</head>
<body>

    <div class="bg-glows">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="#/" class="brand">
                <div class="brand-logo">🤖</div>
                <span class="brand-text">Asa Autobots</span>
            </a>
            
            <ul class="nav-menu">
                <li class="nav-item" data-sec="1-documentation"><a href="#/docs/1-documentation">Specification & API</a></li>
                <li class="nav-item" data-sec="2-design"><a href="#/docs/2-design">Agent Architecture</a></li>
                <li class="nav-item" data-sec="3-system-spec"><a href="#/docs/3-system-spec">System Spec</a></li>
                <li class="nav-item" data-sec="4-map-creation-loading"><a href="#/docs/4-map-creation-loading">Map Editor Guide</a></li>
                <li class="nav-item" data-sec="policy-builder"><a href="#/tools/policy-builder">🛠 Policy Builder</a></li>
                <li class="nav-item" data-sec="map-creator"><a href="#/tools/map-creator">🗺 Map Creator</a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="system-status">
                    <div>Environment Status:</div>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        GitHub Pages Static Hub
                    </div>
                </div>
                <button class="theme-toggle-btn" id="clearCommentsBtn" onclick="clearAllComments()" style="background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); margin-bottom: 0.5rem; display: none;">
                    Clear All Comments
                </button>
                <button class="theme-toggle-btn" id="themeToggle">
                    <span id="themeBtnText">Toggle Light Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Panel -->
        <main class="main-panel">
            <div id="markdown-content">Loading documentation...</div>
        </main>
    </div>

    <script>
        // --- Static Single Page App Router ---
        const contentDiv = document.getElementById('markdown-content');

        // Map files
        const routes = {
            '#/docs/1-documentation': './1-documentation.md',
            '#/docs/2-design': './2-design.md',
            '#/docs/3-system-spec': './3-system-spec.md',
            '#/docs/4-map-creation-loading': './4-map-creation-loading.md',
            '#/tools/policy-builder': 'tools/policy_builder.html',
            '#/tools/map-creator': 'tools/map_creator.html'
        };

        async function handleRoute() {
            let hash = window.location.hash || '#/docs/1-documentation';
            if (hash === '#/' || hash === '#') {
                hash = '#/docs/1-documentation';
            }

            // Highlight Sidebar item
            document.querySelectorAll('.nav-menu .nav-item').forEach(item => {
                item.classList.remove('active');
                const link = item.querySelector('a');
                if (link && link.getAttribute('href') === hash) {
                    item.classList.add('active');
                }
            });

            // Local file:// protocol detection
            const isFileProtocol = window.location.protocol === 'file:';
            let warningBanner = '';
            if (isFileProtocol) {
                warningBanner = `
                    <div class="card" style="border-left: 4px solid var(--accent-orange); background: rgba(249, 115, 22, 0.05); margin-bottom: 2rem;">
                        <div style="display: flex; gap: 1rem; align-items: flex-start;">
                            <span style="font-size: 1.5rem; line-height: 1;">⚠️</span>
                            <div>
                                <h4 style="color: var(--accent-orange); margin-bottom: 0.25rem; font-family: var(--font-heading); font-weight: 700;">Viewing via local file:// protocol</h4>
                                <p style="font-size: 0.9rem; margin-bottom: 0; color: var(--text-main);">
                                    Modern browsers block AJAX/fetch requests when loading files directly via the <code>file://</code> protocol.
                                </p>
                                <ul style="margin-top: 0.5rem; margin-left: 1.25rem; font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 0.25rem;">
                                    <li>To view docs locally, start the local server by running <code>npm run doc</code> in your terminal and visit <a href="http://localhost:3000" target="_blank" style="color: var(--primary); text-decoration: underline;">http://localhost:3000</a>.</li>
                                    <li>To view the online spec, visit your published <a href="https://ale-bena.github.io/asa-autobots/" target="_blank" style="color: var(--primary); text-decoration: underline;">GitHub Pages Site</a>.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }

            const target = routes[hash];
            if (!target) {
                contentDiv.innerHTML = warningBanner + `<h1>404 Not Found</h1><p>The documentation page at <code>${hash}</code> could not be found.</p>`;
                return;
            }

            if (hash.startsWith('#/tools/')) {
                // Render tool in iframe
                contentDiv.innerHTML = warningBanner + `
                    <iframe src="${target}" style="width: 100%; height: calc(100vh - 120px); border: none; border-radius: 12px; background: transparent;" title="Interactive Tool"></iframe>
                `;
                document.getElementById('clearCommentsBtn').style.display = 'none';
            } else {
                // Render markdown
                document.getElementById('clearCommentsBtn').style.display = 'block';
                contentDiv.innerHTML = warningBanner + '<p style="color: var(--text-muted);">Loading content...</p>';
                try {
                    const res = await fetch(target);
                    if (!res.ok) throw new Error(`Status ${res.status}`);
                    const rawText = await res.text();
                    
                    // Compile markdown
                    let compiledHtml = marked.parse(rawText);

                    // Rewrite links: [foo](2-design.md) -> [foo](#/docs/2-design)
                    compiledHtml = compiledHtml.replace(/href="([^"]+)\.md"/g, 'href="#/docs/$1"');

                    contentDiv.innerHTML = warningBanner + compiledHtml;

                    // Parse Mermaid
                    document.querySelectorAll('pre code.language-mermaid').forEach((codeEl) => {
                        const preEl = codeEl.parentElement;
                        const mermaidDiv = document.createElement('div');
                        mermaidDiv.className = 'mermaid';
                        mermaidDiv.textContent = codeEl.textContent;
                        preEl.parentElement.replaceChild(mermaidDiv, preEl);
                    });
                    if (window.mermaid) {
                        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
                        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                    }

                    // Setup interactive comments (localStorage backed)
                    initializeCommentableElements(hash);
                    loadComments(hash);

                } catch (err) {
                    console.error("Error loading markdown file:", err);
                    contentDiv.innerHTML = warningBanner + `
                        <h1 style="color: var(--accent-red);">Error Loading Document</h1>
                        <p style="margin-top: 1rem;">Could not retrieve <code>${target}</code>. Details: <strong>${err.message}</strong></p>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
                            This network error occurs when loading files from the local filesystem. Please start the local documentation server by running <code>npm run doc</code> to resolve this.
                        </p>
                    `;
                }
            }
        }

        // --- LocalStorage Comments System (Static Site Backup) ---
        let currentHash = '';

        function initializeCommentableElements(hash) {
            currentHash = hash;
            document.querySelectorAll('#markdown-content p, #markdown-content li, #markdown-content pre').forEach((el, index) => {
                el.classList.add('commentable');
                const sectionId = `sec_${index}`;
                el.setAttribute('data-section-id', sectionId);

                // Add comment button
                if (!el.querySelector('.comment-indicator-btn')) {
                    const btn = document.createElement('span');
                    btn.className = 'comment-indicator-btn';
                    btn.innerHTML = '💬';
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleCommentsBox(el, sectionId);
                    });
                    el.appendChild(btn);
                }
            });
        }

        function getCommentsData(hash) {
            const allComments = JSON.parse(localStorage.getItem('doc_comments') || '{}');
            return allComments[hash] || {};
        }

        function saveCommentsData(hash, data) {
            const allComments = JSON.parse(localStorage.getItem('doc_comments') || '{}');
            allComments[hash] = data;
            localStorage.setItem('doc_comments', JSON.stringify(allComments));
        }

        function loadComments(hash) {
            const comments = getCommentsData(hash);
            document.querySelectorAll('.commentable').forEach(el => {
                const secId = el.getAttribute('data-section-id');
                const indicator = el.querySelector('.comment-indicator-btn');
                if (indicator) {
                    if (comments[secId] && comments[secId].length > 0) {
                        indicator.classList.add('has-notes');
                        indicator.innerHTML = `💬 (${comments[secId].length})`;
                    } else {
                        indicator.classList.remove('has-notes');
                        indicator.innerHTML = '💬';
                    }
                }
            });
        }

        function toggleCommentsBox(el, sectionId) {
            let box = el.nextElementSibling;
            if (box && box.classList.contains('inline-comments-box')) {
                box.remove();
                return;
            }

            box = document.createElement('div');
            box.className = 'inline-comments-box';
            
            const listDiv = document.createElement('div');
            listDiv.className = 'inline-comments-list';

            const comments = getCommentsData(currentHash)[sectionId] || [];
            comments.forEach(comment => {
                const item = document.createElement('div');
                item.className = 'comment-item';
                item.innerHTML = `
                    <div class="comment-meta">
                        <span>User</span>
                        <span>${new Date(comment.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                `;
                listDiv.appendChild(item);
            });

            if (comments.length === 0) {
                listDiv.innerHTML = '<p style="font-style: italic; color: var(--text-muted);">No comments yet.</p>';
            }

            const inputArea = document.createElement('div');
            inputArea.className = 'inline-comment-input-area';
            inputArea.innerHTML = `
                <input type="text" class="inline-comment-input" placeholder="Write a note/critique...">
                <button class="inline-comment-submit-btn">Post</button>
            `;

            inputArea.querySelector('button').addEventListener('click', () => {
                const input = inputArea.querySelector('input');
                const text = input.value.trim();
                if (!text) return;
                
                const commentsMap = getCommentsData(currentHash);
                if (!commentsMap[sectionId]) commentsMap[sectionId] = [];
                commentsMap[sectionId].push({
                    timestamp: new Date().toISOString(),
                    text: text
                });
                saveCommentsData(currentHash, commentsMap);
                
                input.value = '';
                toggleCommentsBox(el, sectionId); // refresh
                toggleCommentsBox(el, sectionId);
                loadComments(currentHash);
            });

            box.appendChild(listDiv);
            box.appendChild(inputArea);
            el.parentNode.insertBefore(box, el.nextSibling);
        }

        function clearAllComments() {
            if (confirm('Are you sure you want to clear comments for this page?')) {
                const commentsMap = getCommentsData(currentHash);
                for (let key in commentsMap) {
                    delete commentsMap[key];
                }
                saveCommentsData(currentHash, commentsMap);
                
                // Remove existing comment boxes
                document.querySelectorAll('.inline-comments-box').forEach(b => b.remove());
                loadComments(currentHash);
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // --- Theme Toggle ---
        const themeToggle = document.getElementById('themeToggle');
        const themeBtnText = document.getElementById('themeBtnText');
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                themeBtnText.innerText = 'Toggle Dark Mode';
            } else {
                themeBtnText.innerText = 'Toggle Light Mode';
            }
        });

        // Initialize Router
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('DOMContentLoaded', handleRoute);
    </script>
</body>
</html>
